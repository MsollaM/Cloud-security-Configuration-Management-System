<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CSCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .login-header {
            background: linear-gradient(135deg, #1a237e, #283593);
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            color: #fff;
        }
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 0.2rem rgba(26,35,126,0.15);
        }
        .btn-signin {
            background: linear-gradient(135deg, #1a237e, #283593);
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-signin:hover {
            background: linear-gradient(135deg, #283593, #1a237e);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            z-index: 10;
        }
        .toggle-password:hover {
            color: #1a237e;
        }
        .forgot-link {
            color: #1a237e;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
            color: #283593;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-10">
            <div class="card login-card">

                <!-- Header -->
                <div class="login-header">
                    <i class="bi bi-shield-lock-fill" style="font-size:2.8rem;"></i>
                    <h4 class="mt-2 mb-0 fw-bold">CSCMS</h4>
                    <p class="mb-0" style="opacity:0.85;font-size:0.85rem;">Cloud Security Configuration Management</p>
                    <p style="opacity:0.6;font-size:0.75rem;margin-top:4px;">CloudTech Tanzania Ltd</p>
                </div>

                <!-- Form -->
                <div class="card-body p-4">

                    <h6 class="fw-semibold mb-4 text-center" style="color:#333;">Sign in to your account</h6>

                    {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span>Invalid username or password. Please try again.</span>
                    </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:0.9rem;">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text"
                                       name="username"
                                       class="form-control border-start-0"
                                       placeholder="Enter your username"
                                       required
                                       autofocus>
                            </div>
                        </div>

                        <!-- Password with eye toggle -->
                        <div class="mb-2">
                            <label class="form-label fw-semibold" style="font-size:0.9rem;">Password</label>
                            <div class="input-group password-wrapper">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       name="password"
                                       id="passwordField"
                                       class="form-control border-start-0 border-end-0"
                                       placeholder="Enter your password"
                                       required>
                                <button type="button"
                                        class="input-group-text bg-light border-start-0"
                                        id="togglePassword"
                                        title="Show/Hide password">
                                    <i class="bi bi-eye" id="eyeIcon" style="color:#6c757d;cursor:pointer;"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Forgot password link -->
                        <div class="d-flex justify-content-end mb-4">
                            <a href="/accounts/password_reset/" class="forgot-link">
                                <i class="bi bi-question-circle me-1"></i>Forgot password?
                            </a>
                        </div>

                        <!-- Sign In Button -->
                        <button type="submit" class="btn btn-primary btn-signin w-100 rounded-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>

                    </form>
                </div>

                <!-- Footer -->
                <div class="card-footer bg-transparent text-center py-3" style="border-top:1px solid #f0f0f0;">
                    <small class="text-muted">
                        <i class="bi bi-shield-check me-1 text-success"></i>
                        Secure login — your session is encrypted
                    </small>
                </div>

            </div>

            <p class="text-center mt-3" style="color:rgba(255,255,255,0.55);font-size:0.8rem;">
                Group 24 &mdash; Bachelor of Cybersecurity &mdash; IAA
            </p>
        </div>
    </div>
</div>

<!-- Eye toggle script -->
<script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordField = document.getElementById('passwordField');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', function () {
        const isPassword = passwordField.type === 'password';
        passwordField.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('bi-eye', !isPassword);
        eyeIcon.classList.toggle('bi-eye-slash', isPassword);
    });
</script>

</body>
</html>
